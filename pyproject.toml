# --- uv workspace (whole monorepo) ---
# Virtual workspace root. Members are PEP 621 packages (in place; no packages/ move).
[tool.uv.workspace]
members = ["common", "core", "features", "tabular", "timeseries", "multimodal", "autogluon"]

# Resolve sibling autogluon packages to the local workspace members instead of PyPI for dev.
# Each member's deps (incl. shared third-party caps and the exact `==<version>` sibling pins) are
# supplied dynamically by its thin setup.py from core/_setup_utils.py — the single source of truth
# for caps — so they land in both the workspace lock AND published wheels' Requires-Dist (Option B).
[tool.uv.sources]
"autogluon.common" = { workspace = true }
"autogluon.core" = { workspace = true }
"autogluon.features" = { workspace = true }
"autogluon.tabular" = { workspace = true }
"autogluon.timeseries" = { workspace = true }
"autogluon.multimodal" = { workspace = true }
# --- end uv workspace block ---

[tool.ruff]
line-length = 119
target-version = "py310"
lint.ignore = [
    "E501",  # Line too long
    "E731",  # Do not assign a `lambda` expression, use a `def`
    "E722",  # Do not use bare `except`
]
lint.isort.known-first-party = ["autogluon"]
lint.isort.known-third-party = [
    "gluonts",
    "networkx",
    "numpy",
    "pandas",
    "psutil",
    "pytest",
    "scipy",
    "sklearn",
    "tqdm",
    "Pillow",
    "boto3",
    "requests",
    "timm",
    "torch",
    "torchvision",
    "scikit-image",
    "lightning",
    "torchmetrics",
    "transformers",
    "omegaconf",
    "pytorch-metric-learning",
    "nlpaug",
    "nltk",
]
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__.py files


[tool.codespell]
skip = '.git,*.pdf,*.svg,*.ipynb,*.csv,kaggle_feedback_prize'
#
ignore-words-list = 'mape,ans,2st,fo,nd,te,fpr,coo,rouge,SME,NoES'


[tool.pyright]
pythonVersion = "3.10"
include = [
    "timeseries/src/"
]
extraPaths = [
    "common/src",
    "core/src",
    "tabular/src",
    "timeseries/src",
]
