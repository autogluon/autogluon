# --- PROTOTYPE: uv workspace (whole monorepo) ---
# Virtual workspace root. Members are PEP 621 packages (in place; no packages/ move).
[tool.uv.workspace]
members = ["common", "core", "features", "tabular", "timeseries", "multimodal", "autogluon"]

# Resolve sibling autogluon packages to the local workspace members instead of PyPI.
[tool.uv.sources]
"autogluon.common" = { workspace = true }
"autogluon.core" = { workspace = true }
"autogluon.features" = { workspace = true }
"autogluon.tabular" = { workspace = true }
"autogluon.timeseries" = { workspace = true }
"autogluon.multimodal" = { workspace = true }

# Centralized version caps for shared third-party deps (formerly core/_setup_utils.DEPENDENT_PACKAGES,
# applied per-package at build time). Packages now list these deps bare; the caps are enforced once
# here for the whole workspace's resolution / uv.lock.
# NOTE(prototype): constraint-dependencies govern the workspace lock, not the published wheels'
# Requires-Dist. Carrying caps into published wheels (the pip-from-PyPI path) is an open item.
[tool.uv]
constraint-dependencies = [
  "boto3>=1.10,<2",
  "numpy>=1.25.0,<2.5.0",
  "pandas>=2.0.0,<2.4.0",
  "pyarrow>=7.0.0,<21.0.0",
  "scikit-learn>=1.4.0,<1.8.0",
  "scipy>=1.5.4,<1.17",
  "matplotlib>=3.7.0,<3.11",
  "psutil>=5.7.3,<7.2.0",
  "s3fs>=2024.2,<2026",
  "networkx>=3.0,<4",
  "tqdm>=4.38,<5",
  "Pillow>=10.0.1,<12",
  "torch>=2.6,<2.10",
  "lightning>=2.5.1,<2.6",
  "async_timeout>=4.0,<6",
  "transformers>=4.51.0,<4.58",
  "huggingface-hub<1.0",
  "accelerate>=0.34.0,<2.0",
  "typing-extensions>=4.14.0,<5",
  "joblib>=1.2,<1.7",
  "pyyaml>=5.0",
  "packaging>=20",
]
# --- end prototype block ---

[tool.ruff]
line-length = 119
target-version = "py310"
lint.ignore = [
    "E501",  # Line too long
    "E731",  # Do not assign a `lambda` expression, use a `def`
    "E722",  # Do not use bare `except`
]
lint.isort.known-first-party = ["autogluon"]
lint.isort.known-third-party = [
    "gluonts",
    "networkx",
    "numpy",
    "pandas",
    "psutil",
    "pytest",
    "scipy",
    "sklearn",
    "tqdm",
    "Pillow",
    "boto3",
    "requests",
    "timm",
    "torch",
    "torchvision",
    "scikit-image",
    "lightning",
    "torchmetrics",
    "transformers",
    "omegaconf",
    "pytorch-metric-learning",
    "nlpaug",
    "nltk",
]
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__.py files


[tool.codespell]
skip = '.git,*.pdf,*.svg,*.ipynb,*.csv,kaggle_feedback_prize'
#
ignore-words-list = 'mape,ans,2st,fo,nd,te,fpr,coo,rouge,SME,NoES'


[tool.pyright]
pythonVersion = "3.10"
include = [
    "timeseries/src/"
]
extraPaths = [
    "common/src",
    "core/src",
    "tabular/src",
    "timeseries/src",
]
